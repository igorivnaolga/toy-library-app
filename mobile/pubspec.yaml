name: toy_library_mobile
description: Toy Library mobile app
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  provider: ^6.1.2
  supabase_flutter: ^2.9.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  google_mlkit_text_recognition: ^0.15.1
  pdf: ^3.11.3
  printing: ^5.14.2
  google_fonts: ^6.2.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  fl_chart: ^0.70.2
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  image_path: assets/app_icon.png
  android: true
  adaptive_icon_background: "#FDC435"
  adaptive_icon_foreground: assets/app_icon.png
  web:
    generate: true
    image_path: assets/app_icon.png
    background_color: "#FDC435"
    theme_color: "#FDC435"
  windows:
    generate: true
    image_path: assets/app_icon.png
    icon_size: 256

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
