org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# On some Windows setups the Kotlin compile daemon fails to connect (Gradle then retries / falls back).
# In-process compilation avoids that separate daemon and tends to be more reliable (first build may be slower).
kotlin.compiler.execution.strategy=in-process
